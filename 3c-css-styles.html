<!DOCTYPE html>
<html>
<head>
    <title>CSS Styles Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="C:\Users\vthanuja\OneDrive\Documents\Fsd\3c-style.css">

    <!-- Internal CSS -->
    <style>
        /* Selector: p
           Property: font-size
           Value: 18px */
        p {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- External style applied -->
    <h1>This is External CSS</h1>

    <!-- Internal style applied -->
    <p>This is Internal CSS</p>

    <!-- Inline style applied -->
    <div style="color: blue; background-color: lightgray;">
        This is Inline CSS
    </div>
    <!-- Selector: div
         Property: color
         Value: blue -->

</body>
</html>
