<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Semantic Tags</title>
</head>
<body>

<header>
    <h1>My Website</h1>
</header>

<nav>
    <a href="#">Home</a> |
    <a href="#">About</a> |
    <a href="#">Contact</a>
</nav>

<main>
    <section>
        <h2>Main Section</h2>
        <article>
            <h3>Article Title</h3>
            <p>This is an <span style="color:blue;">important</span> article.</p>
        </article>
    </section>

    <aside>
        <h3>Sidebar</h3>
        <p>Related information here.</p>
    </aside>

    <figure>
        <img src="https://files.cults3d.com/uploaders/15490028/illustration-file/67f5cdd2-bfe2-4266-8b2d-00e8f7ab4bba/12.png" alt="Sample Image">
        <figcaption>Sample Image Caption</figcaption>
    </figure>

    <div>
        <p>This is inside a div container.</p>
    </div>
</main>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
