<!DOCTYPE html>
<html>
<head>
    <title>Types of CSS</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;   /* selector: h2, property: color, value: blue */
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 style="color:red;">Inline CSS Example</h1>
<!-- selector: h1, property: color, value: red -->

<h2>Internal CSS Example</h2>

<p>External CSS Example</p>

</body>
</html>
