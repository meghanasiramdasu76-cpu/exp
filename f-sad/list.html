<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists</title>
</head>
<body>

<h2>Ordered List</h2>
<ol>
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ol>

<h2>Unordered List</h2>
<ul>
    <li>Red</li>
    <li>Blue</li>
    <li>Green</li>
</ul>

<h2>Nested List</h2>
<ul>
    <li>Fruits
        <ol>
            <li>Apple</li>
            <li>Mango</li>
        </ol>
    </li>
    <li>Vegetables
        <ol>
            <li>Carrot</li>
            <li>Potato</li>
        </ol>
    </li>
</ul>

<h2>Definition List</h2>
<dl>
    <dt>HTML</dt>
    <dd>Hyper Text Markup Language</dd>
    <dt>CSS</dt>
    <dd>Used for styling</dd>
</dl>

</body>
</html>
