<!DOCTYPE html>
<html>
<head>
    <title>Audio & Video</title>
</head>
<body>

<h2>Audio Example</h2>
<audio controls>
    <source src="https://www.youtube.com/watch?v=8y0_mgh-8R8" type="audio/mpeg">
    Your browser does not support audio.
</audio>

<h2>Video Example</h2>
<video width="320" height="240" controls>
    <source src="https://www.youtube.com/watch?v=8y0_mgh-8R8" type="video/mp4">
    Your browser does not support video.
</video>

</body>
</html>
