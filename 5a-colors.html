<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Color References</title>
    <style>
        /* 1. Color Name */
        .color-name {
            color: red;
        }

        /* 2. Hexadecimal Color */
        .hex-color {
            color: #1e90ff; /* DodgerBlue */
        }

        /* 3. RGB Color */
        .rgb-color {
            color: rgb(34, 139, 34); /* Forest Green */
        }

        /* 4. RGBA Color (with opacity) */
        .rgba-color {
            color: rgba(255, 0, 0, 0.5);
        }

        /* 5. HSL Color */
        .hsl-color {
            color: hsl(300, 100%, 40%);
        }

        /* 6. HSLA Color (with opacity) */
        .hsla-color {
            color: hsla(200, 100%, 50%, 0.6);
        }

        /* 7. Background color example */
        .bg-color {
            background-color: #ffeb3b;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2 class="color-name">This text uses a color name (red)</h2>
    <h2 class="hex-color">This text uses a HEX color (#1e90ff)</h2>
    <h2 class="rgb-color">This text uses RGB color (rgb)</h2>
    <h2 class="rgba-color">This text uses RGBA color (with transparency)</h2>
    <h2 class="hsl-color">This text uses HSL color</h2>
    <h2 class="hsla-color">This text uses HSLA color (with transparency)</h2>

    <p class="bg-color">
        This paragraph demonstrates background color using HEX value.
    </p>

</body>
</html>
