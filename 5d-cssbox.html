<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Box Model</title>

    <style>
        .box {
            /* Content */
            width: 300px;
            height: 150px;
            background-color: lightblue;

            /* Padding */
            padding: 20px;

            /* Border */
            border: 5px solid navy;

            /* Margin */
            margin: 30px;

            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>CSS Box Model Example</h2>

    <div class="box">
        This area represents the CONTENT of the box model.
        Padding creates space inside the border.
        Border surrounds the padding and content.
        Margin creates space outside the border.
    </div>

</body>
</html>
