<!DOCTYPE html>
<html>
<head>
    <title>HTML Tables Example</title>
</head>
<body>

    <h2>HTML Table Demo</h2>

    <table border="1">
        <!-- Table Row 1 -->
        <tr>
            <th rowspan="2">Day</th>
            <th colspan="2">Session</th>
        </tr>

        <!-- Table Row 2 -->
        <tr>
            <th>Morning</th>
            <th>Afternoon</th>
        </tr>

        <!-- Table Row 3 -->
        <tr>
            <td>Monday</td>
            <td>FSD</td>
            <td>DBMS</td>
        </tr>

        <!-- Table Row 4 -->
        <tr>
            <td>Tuesday</td>
            <td>OS</td>
            <td>CN</td>
        </tr>
    </table>

</body>
</html>
