<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Font and Text Properties</title>

    <style>
        /* i. font-size */
        .fontSize {
            font-size: 28px;
        }

        /* ii. font-weight */
        .fontWeight {
            font-weight: bold;
        }

        /* iii. font-style */
        .fontStyle {
            font-style: italic;
        }

        /* iv. text-decoration */
        .textDecoration {
            text-decoration: underline;
        }

        /* v. text-transform */
        .textTransform {
            text-transform: uppercase;
        }

        /* vi. text-align */
        .textAlign {
            text-align: center;
        }
    </style>
</head>

<body>

    <p class="fontSize">This text demonstrates font-size.</p>

    <p class="fontWeight">This text demonstrates font-weight.</p>

    <p class="fontStyle">This text demonstrates font-style.</p>

    <p class="textDecoration">This text demonstrates text-decoration.</p>

    <p class="textTransform">This text demonstrates text-transform.</p>

    <p class="textAlign">This text demonstrates text-align.</p>

</body>
</html>
